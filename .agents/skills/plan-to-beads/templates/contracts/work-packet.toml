# Contract template: executable child work packet.
# Usually embedded under [steps.metadata.workPacket].

goal = "{{goal}}"
inputs = {{inputs_array}}
constraints = {{constraints_array}}
contextRefs = {{context_refs_array}}
inherits = {{inherits_array}}
outputShape = "{{output_shape}}"
allowedFiles = {{allowed_files_array}}
forbiddenFiles = {{forbidden_files_array}}
redCommand = "{{red_command}}"
expectedFailure = "{{expected_failure}}"
greenScope = "{{green_scope}}"
verification = "{{verification}}"
acceptanceCriteria = {{acceptance_criteria_array}}
failureConditions = {{failure_conditions_array}}

[handoff]
requiresBeadsNote = true
requiresCommitSha = {{requires_commit_sha_bool}}
closeByIntegrationOwner = {{close_by_integration_owner_bool}}
artifactRoot = "{{artifact_root}}"
notesSchema = {{handoff_notes_schema_table}}
