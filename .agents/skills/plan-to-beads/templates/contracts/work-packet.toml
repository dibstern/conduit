evidenceRefs = {{evidence_refs_array}}
riskRefs = {{risk_refs_array}}
externalPlanRefs = {{external_plan_refs_array}}
refactorProof = "{{refactor_proof}}"
proofCommand = "{{proof_command}}"
implementationSketches = {{implementation_sketches_array}}
codeContracts = {{code_contracts_array_of_tables}}
