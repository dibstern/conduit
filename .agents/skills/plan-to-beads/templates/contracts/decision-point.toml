# Contract templates: open, blocker, and conditional decisions.

[[openDecision]]
logicalId = "{{decision_logical_id}}"
question = "{{decision_question}}"
status = "{{decision_status}}"
recommendedDefault = "{{decision_recommended_default}}"
options = {{decision_options_array_of_tables}}
selectedOption = "{{decision_selected_option}}"
rationale = "{{decision_rationale}}"
tradeoffs = {{decision_tradeoffs_array}}
blockingScope = {{decision_blocking_scope_array}}
requiredBefore = {{decision_required_before_array}}
proofRequired = "{{decision_proof_required}}"
defaultIfUnanswered = "{{decision_default_if_unanswered}}"
followupTrigger = "{{decision_followup_trigger}}"
externalDecisionOwner = "{{decision_external_owner}}"

[[blockerDecision]]
