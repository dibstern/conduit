# Contract templates: acceptance proof and scenarios.
# Acceptance explains why a command or manual check proves a product criterion.

[[acceptanceMatrix]]
logicalId = "{{acceptance_matrix_logical_id}}"
criteria = {{acceptance_matrix_criteria_array_of_tables}}
ownerLogicalId = "{{acceptance_matrix_owner_logical_id}}"
evidenceToRecord = {{acceptance_matrix_evidence_to_record_array}}

[[acceptanceCriterion]]
logicalId = "{{acceptance_criterion_logical_id}}"
criterion = "{{acceptance_criterion}}"
proof = "{{acceptance_proof}}"
expectedAssertion = "{{acceptance_expected_assertion}}"
ownerLogicalId = "{{acceptance_owner_logical_id}}"
prerequisites = {{acceptance_prerequisites_array}}

[[acceptanceScenario]]
