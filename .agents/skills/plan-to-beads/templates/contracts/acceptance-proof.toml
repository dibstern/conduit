then = {{acceptance_then_array}}
tracePath = "{{acceptance_trace_path}}"
evidenceToRecord = {{acceptance_evidence_to_record_array}}

[[acceptanceTrace]]
logicalId = "{{acceptance_trace_logical_id}}"
criterionRef = "{{acceptance_trace_criterion_ref}}"
