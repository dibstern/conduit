# Role template: checkpoint / integration gate.

[[steps]]
id = "{{logical_id}}"
title = "{{title}}"
type = "task"
description = "{{description}}"
needs = {{needs_array}}

[steps.metadata.planToBeads]
contractVersion = "plan-to-beads.v1"
templateVersion = "{{template_version}}"
role = "checkpoint"
logicalId = "{{logical_id}}"
planId = "{{plan_id}}"
sourcePlan = "{{source_plan}}"
contextRefs = {{context_refs_array}}
inherits = {{inherits_array}}
provides = {{provides_array}}

[steps.metadata.checkpointContract]
gateFor = "{{gate_for}}"
requiresClosed = {{requires_closed_array}}
validationCommands = {{validation_commands_array}}
fanoutRules = {{fanout_rules_array}}
blocksChildCreationUntilClosed = {{blocks_child_creation_until_closed_bool}}
frozenExtensionPoints = {{frozen_extension_points_array}}
mergeOwner = "{{merge_owner}}"
subagentLaunchChecklist = {{subagent_launch_checklist_array}}
handoffValidation = {{handoff_validation_array}}
