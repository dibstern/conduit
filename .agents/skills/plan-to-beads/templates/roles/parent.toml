# Role template: parent / stage feature.

[[steps]]
id = "{{logical_id}}"
title = "{{title}}"
type = "feature"
description = "{{description}}"
needs = {{needs_array}}

[steps.metadata.planToBeads]
contractVersion = "plan-to-beads.v2"
templateVersion = "{{template_version}}"
role = "parent"
logicalId = "{{logical_id}}"
planId = "{{plan_id}}"
sourcePlan = "{{source_plan}}"
contextRefs = {{context_refs_array}}
inherits = {{inherits_array}}
typedContractRefs = {{typed_contract_refs_array}}
provides = {{provides_array}}

[steps.metadata.stageContract]
stage = "{{stage}}"
objective = "{{objective}}"
creationGate = "{{creation_gate}}"
defaultAllowedFiles = {{default_allowed_files_array}}
defaultForbiddenFiles = {{default_forbidden_files_array}}
sharedOwnershipRules = {{shared_ownership_rules_array}}
serialByDefault = {{serial_by_default_bool}}
children = {{children_array}}
checkpoints = {{checkpoints_array}}
ownershipMaps = {{ownership_maps_array_of_tables}}
executorPolicyRefs = {{executor_policy_refs_array}}
guardrailRefs = {{guardrail_refs_array}}

[steps.metadata.stageContract.parallelPolicy]
wave = "{{parallel_wave}}"
maxSubagents = {{max_subagents_int}}
disjointFileScopesRequired = {{disjoint_file_scopes_required_bool}}
launchWhen = "{{launch_when}}"
subagentPromptTemplateRef = "{{subagent_prompt_template_ref}}"
